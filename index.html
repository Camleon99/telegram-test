<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Tap Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            /* This makes the app match the user's Telegram theme (Dark or Light) */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { text-align: center; }

        #score { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }

        .circle {
            width: 200px;
            height: 200px;
            background: var(--tg-theme-button-color, #248bcf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .circle:active { transform: scale(0.95); }

        .username { font-size: 1.2rem; margin-bottom: 20px; color: var(--tg-theme-hint-color, #999); }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="username" id="user-greeting">Hello, Player!</div>
        <div id="score">0</div>
        <div class="circle" id="tap-button">TAP ME!</div>
    </div>

    <script>
        // Initialize the Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app to full height

        let score = 0;
        const scoreElement = document.getElementById('score');
        const tapButton = document.getElementById('tap-button');
        const userGreeting = document.getElementById('user-greeting');

        // Show the user's name from Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userGreeting.innerText = `Hello, ${tg.initDataUnsafe.user.first_name}!`;
        }

        tapButton.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;

            // 1. ADDING "FEEL": Haptic Feedback (vibrates the phone)
            tg.HapticFeedback.impactOccurred('medium');

            // 2. INTERACTIVE UI: Change the main button color randomly
            const colors = ['#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6', '#3498db'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            tapButton.style.backgroundColor = randomColor;

            // 3. SHOW MAIN BUTTON: When they hit 10 points
            if (score === 10) {
                tg.MainButton.setText("SHARE SCORE");
                tg.MainButton.show();
            }
        });

        // Handle the Telegram Main Button click
        tg.onEvent('mainButtonClicked', () => {
            tg.showAlert(`Amazing! You scored ${score} points!`);
        });
    </script>
</body>
</html>
